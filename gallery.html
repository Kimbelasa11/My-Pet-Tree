<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Gallery — My Pet Tree | Our Environmental Impact in Photos</title>
  <meta name="description" content="Browse My Pet Tree's gallery of tree planting, landscaping, nursery, and environmental restoration projects. See our impact in communities.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.mypettree.com/gallery.html">
  <meta property="og:title" content="Gallery — My Pet Tree | Our Environmental Impact in Photos">
  <meta property="og:description" content="See the transformation happening through My Pet Tree's tree planting and restoration projects across communities.">
  <meta property="og:url" content="https://www.mypettree.com/gallery.html">
  <meta property="og:image" content="https://www.mypettree.com/assets/images/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Gallery — My Pet Tree | Our Environmental Impact in Photos">
  <meta name="twitter:description" content="See the transformation through My Pet Tree's projects.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/components.js"></script>
</head>
<body>

  <div id="header-placeholder"></div>
  <div id="banner-placeholder"></div>

  <div class="page-wrapper">

    <section class="section">
      <div class="container">
        <div class="section-header">
          <span class="section-label">Gallery</span>
          <h2 class="section-title">Our Impact in Action</h2>
          <p class="section-desc">See the transformation happening in communities as we plant trees, restore ecosystems, and create green spaces together.</p>
        </div>

        <!-- Filter Buttons -->
        <div class="gallery-filters" role="tablist" aria-label="Gallery categories">
          <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
          <button class="filter-btn" data-filter="projects" role="tab" aria-selected="false">Projects</button>
          <button class="filter-btn" data-filter="events" role="tab" aria-selected="false">Events</button>
          <button class="filter-btn" data-filter="nursery" role="tab" aria-selected="false">Nursery</button>
          <button class="filter-btn" data-filter="planting" role="tab" aria-selected="false">Tree Planting</button>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid">
          <figure class="gallery-item reveal zoom" data-category="projects">
            <img src="assets/images/gallery-placeholder.svg" alt="Community park restoration project with new native trees" loading="lazy" class="gallery-img">
            <figcaption class="gallery-caption">
              <span class="gallery-badge">Projects</span>
              <h3>Park Restoration</h3>
            </figcaption>
          </figure>
          <figure class="gallery-item reveal zoom" data-category="events">
            <img src="assets/images/gallery-placeholder.svg" alt="Community tree planting event with volunteers" loading="lazy" class="gallery-img">
            <figcaption class="gallery-caption">
              <span class="gallery-badge">Events</span>
              <h3>Community Planting Day</h3>
            </figcaption>
          </figure>
          <figure class="gallery-item reveal zoom" data-category="nursery">
            <img src="assets/images/gallery-placeholder.svg" alt="Native tree nursery with saplings" loading="lazy" class="gallery-img">
            <figcaption class="gallery-caption">
              <span class="gallery-badge">Nursery</span>
              <h3>Native Sapling Nursery</h3>
            </figcaption>
          </figure>
          <figure class="gallery-item reveal zoom" data-category="planting">
            <img src="assets/images/gallery-placeholder.svg" alt="Professional tree planting in urban area" loading="lazy" class="gallery-img">
            <figcaption class="gallery-caption">
              <span class="gallery-badge">Tree Planting</span>
              <h3>Urban Tree Canopy</h3>
            </figcaption>
          </figure>
          <figure class="gallery-item reveal zoom" data-category="projects">
            <img src="assets/images/gallery-placeholder.svg" alt="School garden and landscaping project" loading="lazy" class="gallery-img">
            <figcaption class="gallery-caption">
              <span class="gallery-badge">Projects</span>
              <h3>School Garden Project</h3>
            </figcaption>
          </figure>
          <figure class="gallery-item reveal zoom" data-category="events">
            <img src="assets/images/gallery-placeholder.svg" alt="Volunteer appreciation event" loading="lazy" class="gallery-img">
            <figcaption class="gallery-caption">
              <span class="gallery-badge">Events</span>
              <h3>Volunteer Appreciation</h3>
            </figcaption>
          </figure>
          <figure class="gallery-item reveal zoom" data-category="nursery">
            <img src="assets/images/gallery-placeholder.svg" alt="Greenhouse nursery operations" loading="lazy" class="gallery-img">
            <figcaption class="gallery-caption">
              <span class="gallery-badge">Nursery</span>
              <h3>Greenhouse Operations</h3>
            </figcaption>
          </figure>
          <figure class="gallery-item reveal zoom" data-category="planting">
            <img src="assets/images/gallery-placeholder.svg" alt="Large-scale reforestation project" loading="lazy" class="gallery-img">
            <figcaption class="gallery-caption">
              <span class="gallery-badge">Tree Planting</span>
              <h3>Reforestation Initiative</h3>
            </figcaption>
          </figure>
        </div>
      </div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" role="dialog" aria-label="Image viewer" aria-hidden="true">
      <button class="lightbox-close" aria-label="Close image viewer">&times;</button>
      <button class="lightbox-prev" aria-label="Previous image">&#10094;</button>
      <button class="lightbox-next" aria-label="Next image">&#10095;</button>
      <div class="lightbox-content">
        <img src="" alt="" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
      </div>
    </div>

    <!-- ============================================================
         CALL TO ACTION
         ============================================================ -->
    <section class="cta-banner">
      <div class="container cta-banner-content">
        <h2 class="cta-title">Inspired? Let's Plant Together</h2>
        <p class="cta-text">Your neighborhood can be part of this transformation. Contact us to start your project.</p>
        <a href="contact.html" class="btn btn-primary">Start Your Project</a>
      </div>
    </section>

  </div>

  <div id="footer-placeholder"></div>

  <button id="back-to-top" class="back-to-top" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <div class="floating-buttons" aria-label="Quick contact options">
    <a href="tel:+15551234567" class="float-btn float-call" aria-label="Call us"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></a>
    <a href="mailto:hello@mypettree.com" class="float-btn float-message" aria-label="Send us a message"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></a>
    <a href="#" class="float-btn float-messenger" aria-label="Chat on Messenger"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.373 0 0 4.975 0 11.111c0 3.497 1.745 6.616 4.472 8.652V24l4.086-2.242c1.09.301 2.246.464 3.442.464 6.627 0 12-4.974 12-11.111C24 4.975 18.627 0 12 0zm1.193 14.963l-3.056-3.259-5.963 3.259L10.732 8.2l3.131 3.259L19.752 8.2l-6.559 6.763z"/></svg></a>
  </div>

  <script>
    MyPetTree.renderHeader('gallery');
    MyPetTree.renderBanner('Our Gallery', 'See the transformation happening through our tree planting, landscaping, and restoration projects.', 'assets/images/hero-placeholder.svg');
    MyPetTree.renderFooter();
  </script>
  <script src="assets/main.js"></script>
</body>
</html>
